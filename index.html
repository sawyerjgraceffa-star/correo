<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma de Comunicación Avanzada | Seo & Hari</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* =========================================
           1. SISTEMA DE VARIABLES Y TEMAS (CSS)
           ========================================= */
        :root {
            --p-bg: rgba(244, 249, 255, 0.72); 
            --p-white: rgba(255, 255, 255, 0.85);
            --p-accent: #74b9ff;
            --p-accent-dark: #5a96d4;
            --p-accent-soft: rgba(227, 240, 255, 0.7);
            --p-text-main: #4a667d;
            --p-text-light: #9dbcd4;
            --p-border: rgba(225, 239, 255, 0.6);
            --p-shadow-sm: 0 4px 12px rgba(173, 201, 235, 0.1);
            --p-shadow-lg: 0 20px 50px rgba(173, 201, 235, 0.3);
            --p-radius-sm: 12px;
            --p-radius-lg: 24px;
            --p-transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            --p-danger: #ff7675;
        }

        /* =========================================
           2. RESET Y FONDO DE PANTALLA
           ========================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-image: url('3d782e7557e5e8d5e633ebe2722db786.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: var(--p-text-main);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #gatekeeper, .sidebar, .mail-list, .mail-viewer, #calendar-view {
            background: var(--p-bg) !important;
            backdrop-filter: blur(12px);
        }

        button { cursor: pointer; border: none; transition: var(--p-transition); }

        /* =========================================
           3. PANTALLA DE ACCESO (GATEKEEPER)
           ========================================= */
        #gatekeeper {
            position: fixed;
            inset: 0;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 60px;
            padding: 20px;
        }

        .gate-title {
            font-weight: 200;
            font-size: clamp(24px, 5vw, 32px);
            letter-spacing: 8px;
            color: var(--p-text-main);
            text-transform: uppercase;
            text-align: center;
        }

        .gate-users { display: flex; gap: clamp(20px, 10vw, 120px); flex-wrap: wrap; justify-content: center; }

        .user-selector {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            transition: var(--p-transition);
        }

        .user-selector:hover { transform: translateY(-20px); }

        .gate-avatar-frame {
            width: clamp(150px, 40vw, 220px); height: clamp(150px, 40vw, 220px);
            border-radius: 50%;
            background: var(--p-white);
            padding: 10px;
            box-shadow: var(--p-shadow-lg);
            border: 2px solid var(--p-border);
            overflow: hidden;
            position: relative;
        }

        .gate-avatar-frame img {
            position: absolute;
            background: var(--p-accent-soft);
            width: 100%; top: 0; left: 0;
            pointer-events: none;
        }

        .gate-name {
            font-size: 24px; font-weight: 300;
            letter-spacing: 4px; color: var(--p-text-main);
        }

        /* =========================================
           4. LAYOUT PRINCIPAL
           ========================================= */
        #main-container {
            display: none;
            grid-template-columns: 320px 450px 1fr;
            width: 100vw;
            height: 100vh;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        .sidebar {
            border-right: 1px solid var(--p-border);
            display: flex;
            flex-direction: column;
            padding: 40px 30px;
            z-index: 10;
        }

        .identity-card {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 20px;
            background: var(--p-white);
            border-radius: var(--p-radius-lg);
            margin-bottom: 50px;
            cursor: pointer;
            box-shadow: var(--p-shadow-sm);
        }

        .pfp-sidebar-frame {
            width: 55px; height: 55px;
            border-radius: 50%;
            overflow: hidden;
            position: relative;
            border: 3px solid var(--p-white);
            flex-shrink: 0;
            background: #eee;
        }

        .pfp-sidebar-frame img { position: absolute; width: 100%; top: 0; left: 0; pointer-events: none; }

        .btn-compose {
            background: var(--p-accent);
            color: white;
            padding: 20px;
            border-radius: var(--p-radius-sm);
            font-weight: 700;
            box-shadow: 0 10px 25px rgba(116, 185, 255, 0.4);
            margin-bottom: 15px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%;
        }

        .nav-menu { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        .nav-item {
            padding: 16px 20px;
            border-radius: var(--p-radius-sm);
            color: var(--p-text-main);
            display: flex; justify-content: space-between; align-items: center;
            transition: var(--p-transition); cursor: pointer;
        }
        .nav-item.active { background: var(--p-white); color: var(--p-accent); font-weight: 700; box-shadow: var(--p-shadow-sm); }
        .badge { background: var(--p-accent); color: white; padding: 4px 10px; border-radius: 20px; font-size: 11px; }

        .logout-sidebar {
            margin-top: auto;
            padding: 15px;
            border-radius: var(--p-radius-sm);
            background: rgba(255, 118, 117, 0.1);
            color: var(--p-danger);
            text-align: center;
            font-weight: 700;
            cursor: pointer;
        }

        /* =========================================
           5. MAIL LIST & VIEWER
           ========================================= */
        .mail-list { border-right: 1px solid var(--p-border); display: flex; flex-direction: column; overflow: hidden; }
        .list-header { padding: 35px 30px; border-bottom: 1px solid var(--p-border); }
        .search-container input {
            width: 100%; padding: 15px 20px; border-radius: var(--p-radius-sm);
            border: 1px solid var(--p-border); background: var(--p-white); outline: none;
        }

        .stream-container { flex: 1; overflow-y: auto; }
        .mail-card {
            padding: 30px; border-bottom: 1px solid var(--p-border);
            transition: var(--p-transition); position: relative;
            cursor: pointer;
        }
        .mail-card.unread { background: rgba(255, 255, 255, 0.3); border-left: 8px solid var(--p-accent); }
        .mail-card.active { background: var(--p-white); }

        .btn-delete-item {
            position: absolute; right: 20px; top: 25px;
            color: var(--p-danger); background: none; opacity: 0; font-size: 18px;
            z-index: 5;
        }
        .mail-card:hover .btn-delete-item { opacity: 1; }

        .mail-viewer { display: flex; flex-direction: column; overflow-y: auto; height: 100%; }
        .view-header { padding: 80px 100px; border-bottom: 1px solid var(--p-border); }
        .view-subject { font-size: 42px; font-weight: 200; line-height: 1.2; margin-bottom: 50px; }
        .view-body { padding: 80px 100px; font-size: 18px; line-height: 2.4; }

        /* =========================================
           6. MODALES Y EDITOR
           ========================================= */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(173, 201, 235, 0.3);
            backdrop-filter: blur(10px); z-index: 10000; display: none;
            align-items: center; justify-content: center; padding: 20px;
        }
        .modal-box { background: var(--p-white); width: min(500px, 100%); border-radius: 30px; box-shadow: var(--p-shadow-lg); overflow: hidden; }
        
        .editor-modal {
            position: fixed; bottom: 0; right: 20px; width: min(750px, 95vw); height: 750px;
            background: var(--p-white); border-radius: 30px 30px 0 0;
            box-shadow: 0 30px 100px rgba(0,0,0,0.2); display: none;
            flex-direction: column; z-index: 5000; transform: translateY(100%); transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .editor-modal.active { display: flex; transform: translateY(0); }

        .profile-adjust-box {
            width: 250px; height: 250px; border-radius: 50%; overflow: hidden;
            margin: 30px auto; border: 5px solid var(--p-accent-soft); position: relative;
            cursor: move; background: #eee;
        }
        #pfp-preview { position: absolute; pointer-events: none; }

        #calendar-view { display: none; padding: 60px 100px; flex: 1; overflow-y: auto; }
        .calendar-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; margin-top: 50px; }
        .event-card { background: var(--p-white); padding: 40px; border-radius: var(--p-radius-lg); border: 1px solid var(--p-border); position: relative;}

        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--p-accent-soft); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="gatekeeper">
        <h1 class="gate-title">Bienvenido</h1>
        <div class="gate-users">
            <div class="user-selector" onclick="uiPreLogin('seo')">
                <div class="gate-avatar-frame"><img id="gate-pfp-seo" src=""></div>
                <span class="gate-name" id="gate-name-seo">Seo</span>
            </div>
            <div class="user-selector" onclick="uiPreLogin('hari')">
                <div class="gate-avatar-frame"><img id="gate-pfp-hari" src=""></div>
                <span class="gate-name" id="gate-name-hari">Hari</span>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal-login">
        <div class="modal-box" style="padding: 40px; text-align: center;">
            <h2 id="login-title" style="font-weight: 300; letter-spacing: 2px; margin-bottom: 10px;">Acceso Privado</h2>
            <p style="color: var(--p-text-light); margin-bottom: 25px;">Clave inicial: 1234</p>
            <input type="password" id="login-pass-input" placeholder="••••••••" style="width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--p-border); margin-bottom: 20px; text-align: center; font-size: 20px; outline: none;">
            <button class="btn-compose" onclick="logicVerifyLogin()" style="margin-bottom: 10px;">Entrar al Sistema</button>
            <button onclick="uiCloseModals()" style="background:none; color: var(--p-text-light); font-size: 14px;">Cancelar</button>
        </div>
    </div>

    <div id="main-container">
        <aside class="sidebar">
            <div class="identity-card" onclick="uiOpenProfileEditor()">
                <div class="pfp-sidebar-frame"><img id="user-current-pfp" src=""></div>
                <div class="info"><p id="user-current-name">Seo</p><p>En línea</p></div>
            </div>
            <button class="btn-compose" onclick="uiToggleEditor(true)"><span>+</span> Redactar Mensaje</button>
            <button class="btn-compose" style="background: #a29bfe; margin-bottom: 30px;" onclick="uiOpenEventEditor()"><span>📅</span> Nuevo Evento</button>
            <nav class="nav-menu">
                <div class="nav-item active" id="tab-inbox" onclick="uiSwitchFolder('inbox')">Bandeja de Entrada <span class="badge" id="badge-inbox">0</span></div>
                <div class="nav-item" id="tab-sent" onclick="uiSwitchFolder('sent')">Enviados</div>
                <div class="nav-item" id="tab-drafts" onclick="uiSwitchFolder('drafts')">Borradores <span class="badge" id="badge-drafts">0</span></div>
                <div class="nav-item" id="tab-trash" onclick="uiSwitchFolder('trash')">Papelera</div>
                <div class="nav-item" id="tab-calendar" onclick="uiSwitchFolder('calendar')">Calendario</div>
            </nav>
            <div class="logout-sidebar" onclick="sessionLogout()">Cerrar sesión</div>
        </aside>

        <section class="mail-list">
            <div class="list-header"><div class="search-container"><input type="text" placeholder="Buscar..." oninput="logicRenderStream(this.value)"></div></div>
            <div class="stream-container" id="stream-render"></div>
        </section>

        <section id="calendar-view">
            <h1 style="font-weight: 200; font-size: 42px;">Próximas Fechas</h1>
            <div class="calendar-grid" id="calendar-render"></div>
        </section>

        <section class="mail-viewer">
            <div id="view-placeholder" style="text-align:center; padding:100px; opacity:0.3;">Selecciona un mensaje</div>
            <div id="view-active" class="viewer-content" style="display:none;">
                <div class="view-header">
                    <h1 class="view-subject" id="v-subject"></h1>
                    <div style="display:flex; align-items:center; gap:20px;">
                        <div class="pfp-sidebar-frame" style="width:70px; height:70px;"><img id="v-avatar" src=""></div>
                        <div><p id="v-sender" style="font-weight:800;"></p><p id="v-date" style="font-size:12px; color:var(--p-text-light);"></p></div>
                    </div>
                </div>
                <div class="view-body" id="v-body"></div>
            </div>
        </section>
    </div>

    <div class="modal-overlay" id="modal-profile">
        <div class="modal-box">
            <div style="padding:40px; text-align:center;">
                <h3>Configurar Perfil</h3>
                <input type="text" id="pfp-name-input" placeholder="Alias" style="width:100%; padding:12px; margin:20px 0; border-radius:10px; border:1px solid var(--p-border);">
                <input type="password" id="pfp-pass-input" placeholder="Cambiar Contraseña" style="width:100%; padding:12px; margin-bottom:20px; border-radius:10px; border:1px solid var(--p-border);">
                <input type="file" id="pfp-input" accept="image/*" onchange="logicLoadPfp(this)">
                <div class="profile-adjust-box" id="pfp-drag-area">
                    <img id="pfp-preview" src="">
                </div>
                <input type="range" id="pfp-zoom-slider" min="50" max="400" value="100" oninput="logicUpdatePfpTransform()" style="width:100%; margin-top:10px;">
                <p style="font-size:10px; color:gray; margin-top:5px;">Arrastra la imagen para centrarla</p>
                <button class="btn-compose" style="margin-top:20px;" onclick="logicSaveProfile()">Guardar Perfil</button>
                <button onclick="uiCloseModals()" style="background:none; color:gray; margin-top:10px;">Cerrar</button>
            </div>
        </div>
    </div>

    <div id="editor-modal" class="editor-modal">
        <div style="background:var(--p-accent); color:white; padding:20px; display:flex; justify-content:space-between;">
            <span>Redactar</span>
            <button onclick="uiToggleEditor(false)" style="background:none; color:white; font-size:20px;">&times;</button>
        </div>
        <div style="padding:20px; border-bottom:1px solid var(--p-border); display:flex; gap:10px;">
            <button onclick="document.execCommand('bold')"><b>B</b></button>
            <button onclick="document.execCommand('italic')"><i>I</i></button>
            <button onclick="document.getElementById('attach-file').click()">Imagen</button>
            <input type="file" id="attach-file" style="display:none" onchange="editorHandleAttachment(this)">
        </div>
        <div style="padding:20px;">
            <input type="text" id="e-target" readonly style="width:100%; border:none; border-bottom:1px solid var(--p-border); padding:10px 0;">
            <input type="text" id="e-subject" placeholder="Asunto" style="width:100%; border:none; border-bottom:1px solid var(--p-border); padding:10px 0;">
        </div>
        <div id="e-body" contenteditable="true" style="flex:1; padding:20px; overflow-y:auto; outline:none;"></div>
        <div style="padding:20px; display:flex; justify-content:space-between;">
            <button onclick="logicSaveDraft()" style="background:none; color:var(--p-accent); font-weight:700;">Guardar en Borradores</button>
            <button class="btn-compose" style="width:150px; margin:0;" onclick="logicSendMail()">Enviar</button>
        </div>
    </div>

    <div class="modal-overlay" id="modal-event">
        <div class="modal-box" style="padding:40px;">
            <h3>Nuevo Evento</h3>
            <input type="text" id="ev-name" placeholder="Título" style="width:100%; padding:15px; margin:20px 0; border-radius:10px; border:1px solid var(--p-border);">
            <input type="date" id="ev-date" style="width:100%; padding:15px; border-radius:10px; border:1px solid var(--p-border);">
            <button class="btn-compose" style="margin-top:20px;" onclick="logicSaveEvent()">Agendar</button>
            <button onclick="uiCloseModals()" style="background:none; color:gray; margin-top:10px; width:100%;">Cerrar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDmFyhPz3bd1UzEZdcouQW_dgoPUbdQE04", 
            databaseURL: "https://love-look-default-rtdb.firebaseio.com", 
            projectId: "love-look" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentUserId = null;
        let loginTargetId = null;
        let currentFolder = 'inbox';
        let profileDbCache = {};
        let mailDbCache = {};
        let currentPfpData = { zoom: 100, x: 0, y: 0 };

        // --- SISTEMA DE PERFILES Y AJUSTE DE IMAGEN ---
        function applyPfpStyles(imgElement, pData, frameSize) {
            if(!pData || !imgElement) return;
            const scale = frameSize / 250;
            imgElement.style.width = (pData.zoom || 100) + "%";
            imgElement.style.left = ((pData.x || 0) * scale) + "px";
            imgElement.style.top = ((pData.y || 0) * scale) + "px";
        }

        function refreshUIProfile() {
            if(!currentUserId) return;
            const data = profileDbCache[currentUserId];
            const sideImg = document.getElementById('user-current-pfp');
            const sideName = document.getElementById('user-current-name');
            
            if(data) {
                if(data.pfp) sideImg.src = data.pfp;
                sideName.innerText = data.alias || currentUserId.toUpperCase();
                applyPfpStyles(sideImg, data, 55);
            } else {
                sideName.innerText = currentUserId.toUpperCase();
            }
        }

        onValue(ref(db, 'profiles'), (snapshot) => {
            profileDbCache = snapshot.val() || {};
            ['seo', 'hari'].forEach(id => {
                const img = document.getElementById(`gate-pfp-${id}`);
                const nameSpan = document.getElementById(`gate-name-${id}`);
                if(profileDbCache[id]) {
                    if(profileDbCache[id].pfp) img.src = profileDbCache[id].pfp;
                    if(profileDbCache[id].alias) nameSpan.innerText = profileDbCache[id].alias;
                    applyPfpStyles(img, profileDbCache[id], 220);
                }
            });
            refreshUIProfile();
        });

        // --- LÓGICA DE DRAG & DROP PARA EL AVATAR ---
        let isDragging = false;
        let startX, startY;
        const dragArea = document.getElementById('pfp-drag-area');

        dragArea.onmousedown = (e) => {
            isDragging = true;
            startX = e.clientX - currentPfpData.x;
            startY = e.clientY - currentPfpData.y;
        };
        window.onmousemove = (e) => {
            if(!isDragging) return;
            currentPfpData.x = e.clientX - startX;
            currentPfpData.y = e.clientY - startY;
            logicUpdatePfpTransform();
        };
        window.onmouseup = () => isDragging = false;

        window.logicUpdatePfpTransform = () => {
            currentPfpData.zoom = document.getElementById('pfp-zoom-slider').value;
            const img = document.getElementById('pfp-preview');
            img.style.width = currentPfpData.zoom + "%";
            img.style.left = currentPfpData.x + "px";
            img.style.top = currentPfpData.y + "px";
        };

        // --- ACCESO Y SEGURIDAD ---
        window.uiPreLogin = (id) => {
            loginTargetId = id;
            document.getElementById('login-title').innerText = profileDbCache[id]?.alias || id.toUpperCase();
            document.getElementById('modal-login').style.display = 'flex';
        };

        window.logicVerifyLogin = () => {
            const input = document.getElementById('login-pass-input').value;
            const saved = profileDbCache[loginTargetId]?.password || "1234";
            if(input === saved) { uiCloseModals(); bootSession(loginTargetId); }
            else { alert("Contraseña Incorrecta"); }
        };

        window.bootSession = (id) => {
            currentUserId = id;
            document.getElementById('gatekeeper').style.display = 'none';
            document.getElementById('main-container').style.display = 'grid';
            
            // Forzar actualización inmediata de la UI
            refreshUIProfile();
            
            setTimeout(() => document.getElementById('main-container').style.opacity = '1', 50);
            document.getElementById('e-target').value = `Para: ${id === 'seo' ? 'hari' : 'seo'}`;
            logicSyncMails();
            logicSyncEvents();
        };

        window.sessionLogout = () => location.reload();

        // --- GESTIÓN DE CORREOS ---
        function logicSyncMails() {
            onValue(ref(db, 'mails_vProfessional'), (snapshot) => {
                mailDbCache = snapshot.val() || {};
                logicRenderStream();
            });
        }

        window.logicRenderStream = (search = "") => {
            const container = document.getElementById('stream-render');
            container.innerHTML = "";
            let cInbox = 0, cDrafts = 0;
            const mails = Object.keys(mailDbCache).map(id => ({...mailDbCache[id], id})).reverse();

            mails.forEach(m => {
                const toMe = m.to === currentUserId;
                const fromMe = m.from === currentUserId;
                if(toMe && !m.read && !m.trash && !m.draft) cInbox++;
                if(fromMe && m.draft) cDrafts++;

                let valid = false;
                if(currentFolder === 'inbox') valid = (toMe && !m.trash && !m.draft);
                if(currentFolder === 'sent') valid = (fromMe && !m.trash && !m.draft);
                if(currentFolder === 'drafts') valid = (fromMe && m.draft);
                if(currentFolder === 'trash') valid = m.trash && (toMe || fromMe);

                if(valid && m.subject.toLowerCase().includes(search.toLowerCase())) {
                    const card = document.createElement('div');
                    card.className = `mail-card ${(!m.read && toMe && !m.draft) ? 'unread' : ''}`;
                    card.innerHTML = `
                        <button class="btn-delete-item" onclick="logicHandleTrash(event, '${m.id}', ${m.trash})">${m.trash ? '×' : '🗑'}</button>
                        <p style="font-size:11px; float:right;">${m.date.split(',')[0]}</p>
                        <p><b>${m.draft ? '[BORRADOR]' : (fromMe ? 'Para: '+m.to : 'De: '+m.from)}</b></p>
                        <p style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${m.subject}</p>
                    `;
                    card.onclick = () => m.draft ? uiOpenDraft(m) : logicOpenMail(m);
                    container.appendChild(card);
                }
            });
            document.getElementById('badge-inbox').innerText = cInbox;
            document.getElementById('badge-drafts').innerText = cDrafts;
        };

        window.logicOpenMail = (m) => {
            if(m.to === currentUserId) update(ref(db, `mails_vProfessional/${m.id}`), {read:true});
            document.getElementById('view-placeholder').style.display = 'none';
            document.getElementById('view-active').style.display = 'block';
            document.getElementById('v-subject').innerText = m.subject;
            document.getElementById('v-sender').innerText = m.from;
            document.getElementById('v-date').innerText = m.date;
            document.getElementById('v-body').innerHTML = m.body;
            const vImg = document.getElementById('v-avatar');
            vImg.src = profileDbCache[m.from]?.pfp || '';
            applyPfpStyles(vImg, profileDbCache[m.from], 70);
        };

        window.logicSendMail = () => {
            const subject = document.getElementById('e-subject').value;
            const body = document.getElementById('e-body').innerHTML;
            if(!body.trim()) return;
            push(ref(db, 'mails_vProfessional'), {
                from: currentUserId, to: (currentUserId === 'seo' ? 'hari' : 'seo'),
                subject: subject || "(Sin Asunto)", body, date: new Date().toLocaleString(),
                read: false, trash: false, draft: false
            }).then(() => { uiToggleEditor(false); clearEditor(); });
        };

        window.logicSaveDraft = () => {
            const subject = document.getElementById('e-subject').value;
            const body = document.getElementById('e-body').innerHTML;
            push(ref(db, 'mails_vProfessional'), {
                from: currentUserId, to: (currentUserId === 'seo' ? 'hari' : 'seo'),
                subject: subject || "(Borrador)", body, date: new Date().toLocaleString(),
                draft: true, trash: false
            }).then(() => { uiToggleEditor(false); clearEditor(); });
        };

        function uiOpenDraft(m) {
            document.getElementById('e-subject').value = m.subject;
            document.getElementById('e-body').innerHTML = m.body;
            remove(ref(db, `mails_vProfessional/${m.id}`));
            uiToggleEditor(true);
        }

        window.logicHandleTrash = (e, id, inTrash) => {
            e.stopPropagation();
            if(inTrash) { if(confirm("¿Eliminar permanentemente?")) remove(ref(db, `mails_vProfessional/${id}`)); }
            else update(ref(db, `mails_vProfessional/${id}`), {trash:true});
        };

        // --- PERFIL ---
        window.uiOpenProfileEditor = () => {
            const d = profileDbCache[currentUserId] || {};
            document.getElementById('pfp-name-input').value = d.alias || currentUserId.toUpperCase();
            document.getElementById('pfp-pass-input').value = d.password || "";
            document.getElementById('pfp-preview').src = d.pfp || "";
            currentPfpData = { zoom: d.zoom || 100, x: d.x || 0, y: d.y || 0 };
            document.getElementById('pfp-zoom-slider').value = currentPfpData.zoom;
            logicUpdatePfpTransform();
            document.getElementById('modal-profile').style.display = 'flex';
        };

        window.logicLoadPfp = (i) => {
            const r = new FileReader();
            r.onload = (e) => { 
                document.getElementById('pfp-preview').src = e.target.result;
                currentPfpData.x = 0; currentPfpData.y = 0;
                logicUpdatePfpTransform();
            };
            r.readAsDataURL(i.files[0]);
        };

        window.logicSaveProfile = () => {
            const alias = document.getElementById('pfp-name-input').value;
            const pass = document.getElementById('pfp-pass-input').value || profileDbCache[currentUserId]?.password || "1234";
            update(ref(db, `profiles/${currentUserId}`), {
                alias, password: pass, pfp: document.getElementById('pfp-preview').src, ...currentPfpData
            }).then(uiCloseModals);
        };

        // --- NAVEGACIÓN ---
        window.uiSwitchFolder = (f) => {
            currentFolder = f;
            document.getElementById('calendar-view').style.display = (f === 'calendar' ? 'block' : 'none');
            document.querySelectorAll('.mail-list, .mail-viewer').forEach(el => el.style.display = (f === 'calendar' ? 'none' : 'flex'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('tab-' + f).classList.add('active');
            logicRenderStream();
        };

        window.uiToggleEditor = (s) => {
            const m = document.getElementById('editor-modal');
            if(s) { m.style.display = 'flex'; setTimeout(() => m.classList.add('active'), 10); }
            else { m.classList.remove('active'); setTimeout(() => m.style.display = 'none', 600); }
        };

        window.uiCloseModals = () => document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none');
        window.uiOpenEventEditor = () => document.getElementById('modal-event').style.display = 'flex';
        function clearEditor() { document.getElementById('e-subject').value = ""; document.getElementById('e-body').innerHTML = ""; }
        window.editorHandleAttachment = (i) => {
            const r = new FileReader();
            r.onload = (e) => document.execCommand('insertImage', false, e.target.result);
            r.readAsDataURL(i.files[0]);
        };

        // --- EVENTOS ---
        window.logicSaveEvent = () => {
            const title = document.getElementById('ev-name').value;
            const date = document.getElementById('ev-date').value;
            if(title && date) push(ref(db, 'events_vProf'), { title, date }).then(uiCloseModals);
        };

        function logicSyncEvents() {
            onValue(ref(db, 'events_vProf'), (s) => {
                const evs = s.val() || {};
                const r = document.getElementById('calendar-render');
                r.innerHTML = "";
                Object.keys(evs).forEach(id => {
                    const card = document.createElement('div');
                    card.className = "event-card";
                    card.innerHTML = `<button onclick="remove(ref(db, 'events_vProf/${id}'))" style="position:absolute; right:10px; top:10px; background:none; color:red;">×</button><b>${evs[id].title}</b><p>${evs[id].date}</p>`;
                    r.appendChild(card);
                });
            });
        }
    </script>
</body>
</html>
